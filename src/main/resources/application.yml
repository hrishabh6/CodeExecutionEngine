server:
  port: ${SERVER_PORT:8081}

spring:
  application:
    name: code-execution-service
  
  # Redis Configuration
  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:redis}
      port: ${SPRING_DATA_REDIS_PORT}
      timeout: ${SPRING_DATA_REDIS_TIMEOUT:5000ms}


# Actuator Configuration
management:
  endpoints:
    web:
      exposure:
        include: health,metrics,prometheus,info
  metrics:
    export:
      prometheus:
        enabled: true
  endpoint:
    health:
      show-details: always

# Execution Service Configuration
execution:
  worker:
    count: ${WORKER_COUNT:5}
    timeout-seconds: ${EXECUTION_TIMEOUT_SECONDS:10}
    poll-timeout-seconds: ${EXECUTION_POLL_TIMEOUT_SECONDS:5}
  queue:
    name: execution:queue
    status-prefix: "execution:status"
    status-ttl-seconds: 3600
  docker:
    java-image: ${CXE_JAVA_RUNTIME_IMAGE:hrishabhjoshi/my-java-runtime:17}
    python-image: ${CXE_PYTHON_RUNTIME_IMAGE:hrishabhjoshi/python-runtime:3.9}
    memory-limit: ${CXE_DOCKER_MEMORY_LIMIT:256m}
    cpu-limit: ${CXE_DOCKER_CPU_LIMIT:0.5}

# External Services
services:
  problem:
    base-url: ${PROBLEM_SERVICE_URL:http://problem-service:8084}

# Logging
logging:
  level:
    xyz.hrishabhjoshi.codeexecutionengine: DEBUG
    org.springframework.data.redis: WARN
    org.springframework.data.redis.core.RedisConnectionUtils: WARN
    io.lettuce: WARN
    org.springframework: INFO
