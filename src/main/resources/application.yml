server:
  port: 8081

spring:
  application:
    name: code-execution-service
  
  # Redis Configuration
  data:
    redis:
      host: localhost
      port: 6379
      timeout: 5000ms


# Actuator Configuration
management:
  endpoints:
    web:
      exposure:
        include: health,metrics,prometheus,info
  metrics:
    export:
      prometheus:
        enabled: true
  endpoint:
    health:
      show-details: always

# Execution Service Configuration
execution:
  worker:
    count: ${WORKER_COUNT:5}
    timeout-seconds: 10
    poll-timeout-seconds: 5
  queue:
    name: execution:queue
    status-prefix: "execution:status"
    status-ttl-seconds: 3600
  docker:
    java-image: hrishabhjoshi/my-java-runtime:17
    python-image: hrishabhjoshi/python-runtime:3.9
    memory-limit: 256m
    cpu-limit: 0.5

# External Services
services:
  problem:
    base-url: ${PROBLEM_SERVICE_URL:http://localhost:8084}

# Logging
logging:
  level:
    xyz.hrishabhjoshi.codeexecutionengine: DEBUG
    org.springframework.data.redis: WARN
    org.springframework.data.redis.core.RedisConnectionUtils: WARN
    io.lettuce: WARN
    org.springframework: INFO
