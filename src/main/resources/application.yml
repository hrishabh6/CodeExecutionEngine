server:
  port: ${SERVER_PORT:8081}

spring:
  application:
    name: code-execution-service
  
  # Redis Configuration
  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:redis}
      port: ${SPRING_DATA_REDIS_PORT}
      timeout: ${SPRING_DATA_REDIS_TIMEOUT:5000ms}


# Actuator Configuration
management:
  endpoints:
    web:
      exposure:
        include: health,metrics,prometheus,info
  prometheus:
    metrics:
      export:
        enabled: true
  endpoint:
    health:
      show-details: always

# Execution Service Configuration
execution:
  backend: ${EXECUTION_BACKEND:worker-pod}
  worker:
    count: ${WORKER_COUNT:5}
    queue-capacity: ${EXECUTION_WORKER_QUEUE_CAPACITY:100}
    timeout-seconds: ${EXECUTION_TIMEOUT_SECONDS:10}
    poll-timeout-seconds: ${EXECUTION_POLL_TIMEOUT_SECONDS:5}
  queue:
    name: execution:queue
    status-prefix: "execution:status"
    status-ttl-seconds: 3600
  runtime:
    compilation-timeout-seconds: ${EXECUTION_COMPILATION_TIMEOUT_SECONDS:30}
    memory-soft-limit-mb: ${EXECUTION_MEMORY_SOFT_LIMIT_MB:256}
    languages:
      java:
        compile: ${EXECUTION_JAVA_COMPILE_COMMAND:javac}
        run: ${EXECUTION_JAVA_RUN_COMMAND:java}
      python:
        run: ${EXECUTION_PYTHON_RUN_COMMAND:python3}

# External Services
services:
  problem:
    base-url: ${PROBLEM_SERVICE_URL:http://problem-service:8084}

# Logging
logging:
  level:
    xyz.hrishabhjoshi.codeexecutionengine: DEBUG
    org.springframework.data.redis: WARN
    org.springframework.data.redis.core.RedisConnectionUtils: WARN
    io.lettuce: WARN
    org.springframework: INFO
